<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACL4SSR Mannix 订阅转换极速版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Ensure CodeMirror takes full height of its container */
    .cm-editor { height: 100%; min-height: 100%; border-radius: inherit; }
    .cm-scroller { overflow: auto; }
    .cm-focused { outline: none !important; }
    
    /* Dark mode adjustments for CodeMirror */
    @media (prefers-color-scheme: dark) {
      .cm-editor { background-color: #1e293b; color: #f8fafc; }
      .cm-gutters { background-color: #1e293b !important; color: #64748b !important; border-right: 1px solid #334155 !important; }
      .cm-activeLineGutter, .cm-activeLine { background-color: #334155 !important; }
      .cm-cursor { border-left-color: #f8fafc !important; }
    }
    
    /* Support for manual .dark class if added via JS */
    .dark .cm-editor { background-color: #1e293b; color: #f8fafc; }
    .dark .cm-gutters { background-color: #1e293b !important; color: #64748b !important; border-right: 1px solid #334155 !important; }
    .dark .cm-activeLineGutter, .dark .cm-activeLine { background-color: #334155 !important; }
    .dark .cm-cursor { border-left-color: #f8fafc !important; }
  </style>
  <link rel="stylesheet" href="static/main.css">
</head>
<body class="bg-gray-50 dark:bg-slate-900 transition-colors duration-300 antialiased">
  <header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-200 dark:border-slate-700">
    <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
      <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-600 to-brand-400 dark:from-brand-400 dark:to-brand-200 !p-0">
        ACL4SSR Mannix
      </h1>
      
      <div id="resultRow" class="flex w-full md:w-auto flex-1 max-w-2xl bg-gray-100 dark:bg-slate-700/50 rounded-lg overflow-hidden border border-gray-200 dark:border-slate-600 focus-within:ring-2 focus-within:ring-brand-500/50 transition-all">
        <input id="result" readonly type="text" class="flex-1 bg-transparent px-4 py-2 text-sm text-gray-700 dark:text-gray-200 focus:outline-none" placeholder="生成结果将显示在此...">
        <div class="flex">
          <button id="copy" class="px-4 py-2 text-sm font-medium bg-gray-200 dark:bg-slate-600 text-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-slate-500 transition-colors border-l border-gray-200 dark:border-slate-600">复制</button>
          <button id="clash" class="px-4 py-2 text-sm font-bold bg-brand-500 hover:bg-brand-600 text-white transition-colors">Clash</button>
        </div>
      </div>
    </div>
    
    <div class="max-w-5xl mx-auto px-4 pb-4 flex flex-wrap gap-4 items-center">
      <label class="inline-flex items-center cursor-pointer group">
        <div class="relative">
          <input type="checkbox" id="dnsToggle" class="sr-only peer" checked>
          <div class="w-10 h-5 bg-gray-300 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-brand-300 dark:peer-focus:ring-brand-800 rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-brand-600"></div>
        </div>
        <span class="ml-2 text-sm font-medium text-gray-700 dark:text-gray-300 group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors">包含 DNS 配置</span>
      </label>

      <label class="inline-flex items-center cursor-pointer group">
        <div class="relative">
          <input type="checkbox" id="tunToggle" class="sr-only peer" checked>
          <div class="w-10 h-5 bg-gray-300 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-brand-300 dark:peer-focus:ring-brand-800 rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-brand-600"></div>
        </div>
        <span class="ml-2 text-sm font-medium text-gray-700 dark:text-gray-300 group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors">包含 TUN 配置</span>
      </label>
    </div>
  </header>

  <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-6 flex flex-col gap-6">
    <section class="max-w-5xl mx-auto w-full py-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- 订阅链接编辑器 -->
        <div class="flex flex-col h-[400px] min-h-[400px]">
          <label class="text-sm font-medium mb-2 text-slate-700 dark:text-slate-300 opacity-70">订阅链接 (支持多行/Base64/URI)</label>
          <div id="editor" class="flex-1 bg-white dark:bg-slate-800 rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 overflow-hidden text-lg ring-1 ring-slate-900/5"></div>
        </div>
        <!-- 远程规则编辑器 -->
        <div class="flex flex-col h-[400px] min-h-[400px]">
          <label class="text-sm font-medium mb-2 text-slate-700 dark:text-slate-300 opacity-70">远程订阅规则 (支持多行 MRS/YAML 链接)</label>
          <div id="rules-editor" class="flex-1 bg-white dark:bg-slate-800 rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 overflow-hidden text-lg ring-1 ring-slate-900/5"></div>
        </div>
      </div>
    </section>

    <!-- 使用说明 -->
    <footer class="bg-white dark:bg-slate-800 rounded-xl p-6 border border-gray-200 dark:border-slate-700 shadow-sm transition-all">
      <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100 mb-4 flex items-center gap-2">
        <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        使用说明
      </h2>
      <div class="grid md:grid-cols-3 gap-6 text-sm text-gray-600 dark:text-gray-400">
        <div class="space-y-2">
          <h3 class="font-semibold text-gray-800 dark:text-gray-200">1. 输入订阅</h3>
          <p>在编辑器中粘贴原始订阅链接，支持多行输入。可包含 `vmess://`, `ss://`, `ssr://`, `trojan://` 等。</p>
        </div>
        <div class="space-y-2">
          <h3 class="font-semibold text-gray-800 dark:text-gray-200">2. 生成链接</h3>
          <p>上方输入框会自动更新转换后的 API 链接。默认连接同宿主机的 8000 端口后端（自定义后端见源码）。</p>
        </div>
        <div class="space-y-2">
          <h3 class="font-semibold text-gray-800 dark:text-gray-200">3. 导入客户端</h3>
          <p>点击「复制」获取链接，或点击「Clash」一键关联唤起本地客户端进行订阅下载。</p>
        </div>
      </div>
      <div class="mt-6 pt-6 border-t border-gray-100 dark:border-slate-700 text-center text-xs text-gray-400">
        Pure TypeScript 极速转换 | ACL4SSR Mannix SubConverter
      </div>
    </footer>
  </main>

  <script> fetch('deno.json').then(r => r.json()).then(o => { document.head.appendChild(Object.assign(document.createElement('script'), { type: 'importmap', innerHTML: JSON.stringify(o) })); import('./static/main.js') }) </script>
</body>

</html>
